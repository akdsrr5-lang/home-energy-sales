<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ホームエネルギー部 売上物件管理</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f7fa;
      --bg2: #eef1f6;
      --white: #ffffff;
      --border: #e2e6ed;
      --border2: #d0d5de;
      --text: #1a2033;
      --text2: #4a5568;
      --muted: #8a96aa;
      --accent: #2563eb;
      --accent2: #1d4ed8;
      --accent-bg: #eff6ff;
      --green: #059669;
      --green-bg: #ecfdf5;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --gold: #d97706;
      --gold-bg: #fffbeb;
      --purple: #7c3aed;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
      --shadow-lg: 0 10px 30px rgba(0,0,0,.1), 0 4px 8px rgba(0,0,0,.05);
      --radius: 12px;
      --radius-sm: 8px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; line-height: 1.6; }

    /* ── Header ── */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      height: 64px;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow-sm);
    }
    .header-logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .header-title { font-size: 16px; font-weight: 700; color: var(--text); font-family: 'Sora', sans-serif; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-badge {
      margin-left: auto;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 11px; font-weight: 700;
      padding: 4px 12px; border-radius: 20px;
      border: 1px solid #bfdbfe;
      font-family: 'Sora', sans-serif;
    }
    .save-status { font-size: 11px; color: var(--green); margin-left: 8px; opacity: 0; transition: opacity .3s; display: flex; align-items: center; gap: 4px; }
    .save-status.show { opacity: 1; }

    /* ── Tabs ── */
    .tabs {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      overflow-x: auto;
    }
    .tab {
      padding: 16px 20px;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all .2s;
      border-top: none; border-left: none; border-right: none;
      background: none;
      font-family: inherit;
      white-space: nowrap;
      letter-spacing: .01em;
    }
    .tab:hover { color: var(--text2); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

    /* ── Content ── */
    .content { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    /* ── Section title ── */
    .section-title {
      font-size: 13px; font-weight: 700; color: var(--text2);
      letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Cards ── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }

    /* ── Form ── */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--text2); letter-spacing: .06em;
      margin-bottom: 6px; text-transform: uppercase;
    }
    .form-group input, .form-group select {
      width: 100%; padding: 9px 12px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      border: 1.5px solid var(--border);
      color: var(--text); font-size: 13px; font-family: inherit;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
      background: var(--white);
    }
    .form-group select option { background: var(--white); }
    .form-group.profit-display input { color: var(--green); font-weight: 700; background: var(--green-bg); border-color: #a7f3d0; }
    .form-group.rate-display input { color: var(--gold); font-weight: 700; background: var(--gold-bg); border-color: #fcd34d; }
    .form-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }

    /* ── Buttons ── */
    .btn { padding: 9px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all .15s; letter-spacing: .02em; }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 1px 3px rgba(37,99,235,.3); }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.3); }
    .btn-secondary { background: var(--white); color: var(--text2); border: 1.5px solid var(--border2); }
    .btn-secondary:hover { border-color: var(--text2); color: var(--text); }
    .btn-danger { background: var(--white); color: var(--red); border: 1.5px solid #fca5a5; font-size: 12px; padding: 7px 14px; }
    .btn-danger:hover { background: var(--red-bg); }
    .btn-edit { background: var(--white); color: var(--accent); border: 1.5px solid #bfdbfe; font-size: 12px; padding: 5px 12px; border-radius: 6px; }
    .btn-edit:hover { background: var(--accent-bg); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); background: var(--white); box-shadow: var(--shadow-sm); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: var(--bg); }
    thead th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:hover { background: var(--bg); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 11px 14px; vertical-align: middle; white-space: nowrap; }

    /* ── Badges ── */
    .rank-badge { display: inline-block; width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; font-size: 11px; font-weight: 900; }
    .rank-A { background: #fee2e2; color: var(--red); }
    .rank-B { background: var(--gold-bg); color: var(--gold); }
    .rank-C { background: var(--green-bg); color: var(--green); }
    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .status-見積 { background: var(--bg2); color: var(--text2); }
    .status-受注 { background: var(--gold-bg); color: var(--gold); border: 1px solid #fcd34d; }
    .status-売上 { background: var(--green-bg); color: var(--green); border: 1px solid #6ee7b7; }
    .status-失注 { background: #f5f3ff; color: var(--purple); border: 1px solid #ddd6fe; }

    /* ── Numbers ── */
    .num { font-family: 'DM Mono', monospace; font-size: 12px; text-align: right; }
    .num.profit { color: var(--green); }
    .num.loss { color: var(--red); }
    .num.gold { color: var(--gold); }

    /* ── Budget table ── */
    .budget-table th.sub { color: var(--muted); font-size: 10px; }
    .diff-pos { color: var(--green); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; }
    .diff-neg { color: var(--red); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; }
    .diff-zero { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }
    .budget-input {
      width: 130px; padding: 6px 10px; border-radius: 6px;
      text-align: right; background: var(--bg);
      border: 1.5px solid var(--border); color: var(--text);
      font-size: 12px; font-family: 'DM Mono', monospace; outline: none;
    }
    .budget-input:focus { border-color: var(--accent); background: var(--white); box-shadow: 0 0 0 3px rgba(37,99,235,.08); }
    .annual-highlight { background: linear-gradient(90deg, #f0fdf4, #eff6ff) !important; border-top: 2px solid var(--green) !important; }
    .annual-highlight td { padding: 16px 14px !important; font-weight: 800 !important; }

    /* ── Stats bar ── */
    .stats-bar { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px;
      min-width: 140px; flex: 1;
      box-shadow: var(--shadow-sm);
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-card.blue::before { background: linear-gradient(90deg, var(--accent), #7c3aed); }
    .stat-card.green::before { background: linear-gradient(90deg, var(--green), #10b981); }
    .stat-card.gold::before { background: linear-gradient(90deg, var(--gold), #f59e0b); }
    .stat-card.red::before { background: linear-gradient(90deg, var(--red), #ef4444); }
    .stat-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
    .stat-value { font-size: 20px; font-weight: 800; color: var(--text); margin-top: 6px; font-family: 'Sora', sans-serif; }
    .stat-value.blue { color: var(--accent); }
    .stat-value.green { color: var(--green); }
    .stat-value.gold { color: var(--gold); }
    .stat-value.red { color: var(--red); }

    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border);
      background: var(--white); color: var(--text2); font-family: inherit;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.4);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px;
      width: 90%; max-width: 640px; max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 24px; font-family: 'Sora', sans-serif; }
    .delete-confirm {
      background: var(--red-bg); border: 1px solid #fca5a5;
      border-radius: 10px; padding: 16px; margin-top: 16px;
    }
    .delete-confirm p { color: var(--red); margin-bottom: 12px; line-height: 1.6; font-size: 13px; }
    .delete-confirm input {
      width: 100%; padding: 8px 12px; border-radius: 6px;
      background: var(--white); border: 1.5px solid #fca5a5;
      color: var(--red); font-size: 13px; font-family: 'DM Mono', monospace;
      outline: none; margin-bottom: 10px;
    }

    /* ── Gas tab ── */
    .gas-actual-input {
      width: 130px; padding: 6px 10px; border-radius: 6px;
      text-align: right; background: var(--bg);
      border: 1.5px solid var(--border); color: var(--text);
      font-size: 12px; font-family: 'DM Mono', monospace; outline: none;
    }
    .gas-actual-input:focus { border-color: var(--green); background: var(--white); }

    @media(max-width:640px){
      .content { padding: 16px; }
      .header { padding: 0 16px; }
      .header-title { font-size: 14px; }
      .tabs { padding: 0 8px; }
      .tab { padding: 12px 14px; font-size: 12px; }
      .stats-bar { gap: 10px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const FISCAL_MONTHS = [
  { label:"2026年6月",  year:2026, month:6  },
  { label:"2026年7月",  year:2026, month:7  },
  { label:"2026年8月",  year:2026, month:8  },
  { label:"2026年9月",  year:2026, month:9  },
  { label:"2026年10月", year:2026, month:10 },
  { label:"2026年11月", year:2026, month:11 },
  { label:"2026年12月", year:2026, month:12 },
  { label:"2027年1月",  year:2027, month:1  },
  { label:"2027年2月",  year:2027, month:2  },
  { label:"2027年3月",  year:2027, month:3  },
  { label:"2027年4月",  year:2027, month:4  },
  { label:"2027年5月",  year:2027, month:5  },
];
const STATUS_OPTIONS = ["見積","受注","売上","失注"];
const RANK_OPTIONS   = ["A","B","C"];
const STAFF_OPTIONS  = ["福田","原田"];
const EMPTY_FORM     = { date:"", status:"見積", name:"", sales:"", purchase:"", rank:"A", staff:"福田" };
const EMPTY_GAS_FORM = { monthKey:"2026-06", period:"前期", forecast:"" };

const fmt    = n => n == null || n === "" ? "—" : Number(n).toLocaleString("ja-JP") + "円";
const fmtK   = n => n == null || n === 0  ? "—" : (Math.round(Number(n)/1000)).toLocaleString("ja-JP") + "千円";
const fmtPct = n => n == null || isNaN(n) ? "—" : Number(n).toFixed(1) + "%";
const calcProfit = (s,p) => (parseFloat(s)||0) - (parseFloat(p)||0);
const calcRate   = (s,p) => { const sv=parseFloat(s)||0; return sv===0?0:((sv-(parseFloat(p)||0))/sv)*100; };
const monthKey   = (y,m) => `${y}-${String(m).padStart(2,"0")}`;
const dateToMK   = d => { if(!d) return null; const dt=new Date(d); return monthKey(dt.getFullYear(),dt.getMonth()+1); };

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzpEaLlJwAvhJmyBKYo0AfqY1o9kh7f9TMSt7zYVyLFRMYIy1BMTIqtj5wU7FSerd8LDA/exec';

// ローカルキャッシュ（オフライン対応）
const lsGet = key => { try { const v=localStorage.getItem(key); return v?JSON.parse(v):null; } catch { return null; } };
const lsSet = (key,val) => { try { localStorage.setItem(key,JSON.stringify(val)); } catch {} };

// スプレッドシートからロード
async function gasLoad() {
  const res = await fetch(GAS_URL + '?action=load');
  return await res.json();
}
// スプレッドシートへ保存
async function gasSave(properties, budgets, gas) {
  await fetch(GAS_URL, {
    method:'POST',
    body: JSON.stringify({ action:'save', properties, budgets, gas }),
  });
}

function StaffToggle({ value, onChange, options }) {
  return (
    <div style={{display:"flex",gap:8,marginTop:2}}>
      {options.map(s=>(
        <button key={s} type="button" onClick={()=>onChange(s)}
          style={{flex:1,padding:"8px 0",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all .15s",
            background:value===s?"var(--accent)":"var(--bg)",
            color:value===s?"#fff":"var(--text2)",
            border:value===s?"1.5px solid var(--accent)":"1.5px solid var(--border)"}}>
          {s}
        </button>
      ))}
    </div>
  );
}

function BudgetInput({ bkey, locked, value, onSave, onToggleLock }) {
  const [local, setLocal] = useState(value === 0 ? "" : String(value));
  useEffect(() => { setLocal(value === 0 ? "" : String(value)); }, [bkey]);
  return (
    <div style={{display:"flex",alignItems:"center",gap:4}}>
      <input
        className="budget-input"
        type="number"
        value={local}
        placeholder="千円入力"
        disabled={locked}
        onChange={e => setLocal(e.target.value)}
        onBlur={e => onSave(bkey, e.target.value)}
        style={{opacity:locked?0.5:1, cursor:locked?"not-allowed":"text", width:100}}
      />
      <button tabIndex={-1} onClick={()=>onToggleLock(bkey)} title={locked?"ロック解除":"施錠"}
        style={{padding:"4px 6px",borderRadius:6,fontSize:13,cursor:"pointer",border:"1.5px solid",background:"transparent",transition:"all .15s",
          borderColor:locked?"#fca5a5":"var(--border)",color:locked?"var(--red)":"var(--muted)"}}>
        {locked?"🔒":"🔓"}
      </button>
    </div>
  );
}

function App() {
  const [tab, setTab]           = useState("input");
  const [properties, setProperties] = useState([]);
  const [budgets, setBudgets]   = useState({});
  const [gasEntries, setGasEntries] = useState([]);
  const [gasForm, setGasForm]   = useState(EMPTY_GAS_FORM);
  const [gasActualInputs, setGasActualInputs] = useState({});
  const [form, setForm]         = useState(EMPTY_FORM);
  const [filter, setFilter]     = useState("all");
  const [staffFilter, setStaffFilter] = useState("all");
  const [editId, setEditId]     = useState(null);
  const [editForm, setEditForm] = useState(null);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [deleteInput, setDeleteInput]   = useState("");
  const [gasDeleteTarget, setGasDeleteTarget] = useState(null);
  const [gasDeleteInput, setGasDeleteInput]   = useState("");
  const [saveMsg, setSaveMsg]   = useState(false);
  const [budgetLocks, setBudgetLocks] = useState({});
  const [loading, setLoading]   = useState(true);
  const [syncing, setSyncing]   = useState(false);

  useEffect(() => {
    // まずローカルキャッシュで即表示
    const p = lsGet("he_properties"); if(p) setProperties(p);
    const b = lsGet("he_budgets");    if(b) setBudgets(b);
    const g = lsGet("he_gas");        if(g) setGasEntries(g);
    const l = lsGet("he_budgetlocks"); if(l) setBudgetLocks(l);
    // スプレッドシートから最新データを取得
    gasLoad().then(data => {
      if(data.properties) { setProperties(data.properties); lsSet("he_properties", data.properties); }
      if(data.budgets)    { setBudgets(data.budgets);       lsSet("he_budgets",    data.budgets); }
      if(data.gas)        { setGasEntries(data.gas);        lsSet("he_gas",        data.gas); }
    }).catch(()=>{ /* オフライン時はキャッシュのまま */ }).finally(()=>setLoading(false));
  }, []);

  const flash = () => { setSaveMsg(true); setTimeout(()=>setSaveMsg(false),2500); };

  const saveAll = (props, bdgs, gas) => {
    // ローカルキャッシュに即保存
    lsSet("he_properties", props); lsSet("he_budgets", bdgs); lsSet("he_gas", gas);
    flash();
    // スプレッドシートに非同期保存
    setSyncing(true);
    gasSave(props, bdgs, gas).finally(()=>setSyncing(false));
  };
  const saveGas = gas => {
    lsSet("he_gas", gas); flash();
    setSyncing(true);
    const props = lsGet("he_properties")||[], bdgs = lsGet("he_budgets")||{};
    gasSave(props, bdgs, gas).finally(()=>setSyncing(false));
  };
  const toggleBudgetLock = key => {
    const next = {...budgetLocks, [key]: !budgetLocks[key]};
    setBudgetLocks(next); lsSet("he_budgetlocks", next);
  };

  const handleAdd = () => {
    if(!form.date||!form.name) return alert("売上予定日と物件名は必須です");
    const next = [...properties, { id:Date.now().toString(), ...form, sales:parseFloat(form.sales)||0, purchase:parseFloat(form.purchase)||0, createdAt:new Date().toISOString() }];
    setProperties(next); saveAll(next,budgets,gasEntries); setForm(EMPTY_FORM);
  };
  const handleEditSave = () => {
    const updated = properties.map(p => p.id===editId ? {...p,...editForm,sales:parseFloat(editForm.sales)||0,purchase:parseFloat(editForm.purchase)||0} : p);
    setProperties(updated); saveAll(updated,budgets,gasEntries); setEditId(null);
  };
  const handleDelete = () => {
    if(deleteInput!=="削除確認") return alert('「削除確認」と入力してください');
    const next = properties.filter(p=>p.id!==deleteTarget.id);
    setProperties(next); saveAll(next,budgets,gasEntries); setDeleteTarget(null); setDeleteInput(""); setEditId(null);
  };
  const handleBudget = (key,val) => {
    const next = {...budgets,[key]:parseFloat(val)||0};
    setBudgets(next); saveAll(properties,next,gasEntries);
  };
  // 予算は千円単位入力 → 円換算
  const budgetYen = key => (budgets[key]||0) * 1000;

  const handleGasAdd = () => {
    if(!gasForm.forecast) return alert("見込金額を入力してください");

                      };
                      const kami=calcGroup(KAMI),shimo=calcGroup(SHIMO);
                      const total={bGas:kami.bGas+shimo.bGas,bKougu:kami.bKougu+shimo.bKougu,bTotal:kami.bTotal+shimo.bTotal,aGas:kami.aGas+shimo.aGas,aKougu:kami.aKougu+shimo.aKougu,aTotal:kami.aTotal+shimo.aTotal,fGas:kami.fGas+shimo.fGas,fKougu:kami.fKougu+shimo.fKougu,fTotal:kami.fTotal+shimo.fTotal,dGas:kami.dGas+shimo.dGas,dKougu:kami.dKougu+shimo.dKougu,dTotal:kami.dTotal+shimo.dTotal};
                      total.rGas=total.bGas>0?(total.aGas/total.bGas)*100:null;
                      total.rKougu=total.bKougu>0?(total.aKougu/total.bKougu)*100:null;
                      total.rTotal=total.bTotal>0?(total.aTotal/total.bTotal)*100:null;
                      const D=(diff,has)=>has?<span className={diff>0?"diff-pos":diff<0?"diff-neg":"diff-zero"}>{(diff>0?"▲ ":diff<0?"▼ ":"")+Math.round(Math.abs(diff)/1000).toLocaleString()}千円</span>:<span style={{color:"var(--border2)"}}>—</span>;
                      const R=(rate,size=12)=>rate!==null?<span style={{fontFamily:"'DM Mono',monospace",fontSize:size,fontWeight:900,color:rate>=100?"var(--green)":rate>=80?"var(--gold)":"var(--red)"}}>{rate.toFixed(1)}%</span>:"—";
                      const MonthRow=({label,year,month})=>{
                        const key=monthKey(year,month),gd=gasMonthly[key];
                        const bGas=budgetYen(key+"_gas"),bKougu=budgetYen(key+"_kougu"),bTotal=bGas+bKougu;
                        const lockedGas=!!budgetLocks[key+"_gas"],lockedKougu=!!budgetLocks[key+"_kougu"];
                        const aGas=gd.hasActual?gd.actual:0;
                        const aKougu=properties.filter(p=>p.status==="売上"&&dateToMK(p.date)===key).reduce((s,p)=>s+p.sales,0);
                        const aTotal=aGas+aKougu;
                        const fGas=gd.forecast||0;
                        const fKougu=properties.filter(p=>((p.status==="見積"&&p.rank==="A")||p.status==="受注")&&dateToMK(p.date)===key).reduce((s,p)=>s+p.sales,0);
                        const fTotal=fGas+fKougu;
                        const dGas=aGas-bGas,dKougu=aKougu-bKougu,dTotal=aTotal-bTotal;
                        const rGas=bGas>0?(aGas/bGas)*100:null,rKougu=bKougu>0?(aKougu/bKougu)*100:null,rTotal=bTotal>0?(aTotal/bTotal)*100:null;
                        return(<tr key={key}>
                          <td style={{fontWeight:600}}>{label}</td>
                          <td style={{background:"#f8fafc"}}><BudgetInput bkey={key+"_gas"} locked={lockedGas} value={budgets[key+"_gas"]||0} onSave={handleBudget} onToggleLock={toggleBudgetLock}/></td>
                          <td style={{background:"#f8fafc"}}><BudgetInput bkey={key+"_kougu"} locked={lockedKougu} value={budgets[key+"_kougu"]||0} onSave={handleBudget} onToggleLock={toggleBudgetLock}/></td>
                          <td className="num" style={{fontWeight:700,borderRight:"2px solid var(--border)",background:"#f8fafc",color:bTotal>0?"var(--text2)":"var(--border2)"}}>{fmtK(bTotal)}</td>
                          <td className="num" style={{color:aGas>0?"#0891b2":"var(--border2)"}}>{fmtK(aGas)}</td>
                          <td className="num" style={{color:aKougu>0?"var(--accent)":"var(--border2)"}}>{fmtK(aKougu)}</td>
                          <td className="num" style={{fontWeight:700,borderRight:"2px solid var(--border)",color:aTotal>0?"var(--green)":"var(--border2)"}}>{fmtK(aTotal)}</td>
                          <td className="num" style={{color:fGas>0?"#0891b2":"var(--border2)"}}>{fmtK(fGas)}</td>
                          <td className="num" style={{color:fKougu>0?"var(--gold)":"var(--border2)"}}>{fmtK(fKougu)}</td>
                          <td className="num" style={{fontWeight:700,borderRight:"2px solid var(--border)",color:fTotal>0?"var(--gold)":"var(--border2)"}}>{fmtK(fTotal)}</td>
                          <td style={{background:"#f0f9ff"}}>{D(dGas,bGas>0)}</td>
                          <td style={{background:"#f0f9ff",borderRight:"2px solid var(--border)"}}>{R(rGas)}</td>
                          <td style={{background:"#f8faff"}}>{D(dKougu,bKougu>0)}</td>
                          <td style={{background:"#f8faff",borderRight:"2px solid var(--border)"}}>{R(rKougu)}</td>
                          <td style={{background:"#f0fdf4"}}>{D(dTotal,bTotal>0)}</td>
                          <td style={{background:"#f0fdf4"}}>{R(rTotal)}</td>
                        </tr>);
                      };
                      const SummaryRow=({label,g,bg,borderTop,isTotal})=>(<tr style={{background:bg,borderTop:borderTop||"none"}}>
                        <td style={{fontWeight:isTotal?900:700,fontSize:isTotal?14:12,color:isTotal?"var(--green)":label.includes("下期")?"#0369a1":"#059669",paddingLeft:18,whiteSpace:"nowrap"}}>{label}</td>
                        <td style={{background:isTotal?"#dcfce7":"#f1f5f9"}}><span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:12,color:"#0891b2"}}>{fmtK(g.bGas)}</span></td>
                        <td style={{background:isTotal?"#dcfce7":"#f1f5f9"}}><span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:12,color:"var(--accent)"}}>{fmtK(g.bKougu)}</span></td>
                        <td style={{borderRight:"2px solid var(--border)",background:isTotal?"#dcfce7":"#f1f5f9"}}><span style={{fontFamily:"'DM Mono',monospace",fontWeight:900,fontSize:isTotal?14:12,color:isTotal?"var(--green)":"var(--text2)"}}>{fmtK(g.bTotal)}</span></td>
                        <td><span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:12,color:"#0891b2"}}>{fmtK(g.aGas)}</span></td>
                        <td><span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:12,color:"var(--accent)"}}>{fmtK(g.aKougu)}</span></td>
                        <td style={{borderRight:"2px solid var(--border)"}}><span style={{fontFamily:"'DM Mono',monospace",fontWeight:900,fontSize:isTotal?15:13,color:"var(--green)"}}>{fmtK(g.aTotal)}</span></td>
                        <td><span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:12,color:"#0891b2"}}>{fmtK(g.fGas)}</span></td>
                        <td><span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:12,color:"var(--gold)"}}>{fmtK(g.fKougu)}</span></td>
                        <td style={{borderRight:"2px solid var(--border)"}}><span style={{fontFamily:"'DM Mono',monospace",fontWeight:900,fontSize:isTotal?15:13,color:"var(--gold)"}}>{fmtK(g.fTotal)}</span></td>
                        <td style={{background:"#f0f9ff"}}>{D(g.dGas,g.bGas>0)}</td>
                        <td style={{background:"#f0f9ff",borderRight:"2px solid var(--border)"}}>{R(g.rGas,isTotal?14:12)}</td>
                        <td style={{background:"#f8faff"}}>{D(g.dKougu,g.bKougu>0)}</td>
                        <td style={{background:"#f8faff",borderRight:"2px solid var(--border)"}}>{R(g.rKougu,isTotal?14:12)}</td>
                        <td style={{background:"#f0fdf4"}}>{D(g.dTotal,g.bTotal>0)}</td>
                        <td style={{background:"#f0fdf4"}}>{R(g.rTotal,isTotal?15:13)}</td>
                      </tr>);
                      return(<>
                        {KAMI.map(m=><MonthRow key={monthKey(m.year,m.month)} {...m}/>)}
                        <SummaryRow label="📗 上期合計（6〜11月）" g={kami} bg="#f0fdf4" borderTop="2px solid #6ee7b7"/>
                        {SHIMO.map(m=><MonthRow key={monthKey(m.year,m.month)} {...m}/>)}
                        <SummaryRow label="📘 下期合計（12〜5月）" g={shimo} bg="#eff6ff" borderTop="2px solid #bfdbfe"/>
                        <SummaryRow label="🏆 通期合計（6〜5月）" g={total} bg="#f0fdf4" borderTop="3px solid var(--green)" isTotal/>
                      </>);
                    })()}
                  </tbody>
                </table>
              </div>
              <div style={{marginTop:32}}>
                <div className="section-title">物件一覧サマリー</div>
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>売上予定日</th><th>ステータス</th><th>物件名</th><th>担当者</th><th>売上金額</th><th>利益</th><th>利益率</th><th>ランク</th></tr></thead>
                    <tbody>
                      {properties.length===0?(<tr><td colSpan={8} className="empty-state">物件なし</td></tr>):(
                        [...properties].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(p=>{
                          const profit=calcProfit(p.sales,p.purchase), rate=calcRate(p.sales,p.purchase);
                          return (<tr key={p.id}><td style={{fontSize:12,color:"var(--muted)"}}>{p.date}</td><td><span className={`status-badge status-${p.status}`}>{p.status}</span></td><td style={{fontWeight:500}}>{p.name}</td><td style={{fontWeight:600}}>{p.staff||"—"}</td><td className="num">{fmt(p.sales)}</td><td className={`num ${profit>=0?"profit":"loss"}`}>{fmt(profit)}</td><td className={`num ${profit>=0?"gold":"loss"}`}>{fmtPct(rate)}</td><td><span className={`rank-badge rank-${p.rank}`}>{p.rank}</span></td></tr>);
                        })
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </>
          )}
        </div>
      </div>

      {/* 編集モーダル */}
      {editId && editForm && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget){setEditId(null);setDeleteTarget(null);}}}>
          <div className="modal">
            <div className="modal-title">✏️ 物件情報を編集</div>
            <div className="form-grid">
              <div className="form-group"><label>売上予定日</label><input type="date" value={editForm.date} onChange={e=>setEditForm({...editForm,date:e.target.value})}/></div>
              <div className="form-group"><label>ステータス</label><select value={editForm.status} onChange={e=>setEditForm({...editForm,status:e.target.value})}>{STATUS_OPTIONS.map(s=><option key={s}>{s}</option>)}</select></div>
              <div className="form-group" style={{gridColumn:"span 2"}}><label>物件名</label><input type="text" value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})}/></div>
              <div className="form-group"><label>売上金額</label><input type="number" value={editForm.sales} onChange={e=>setEditForm({...editForm,sales:e.target.value})}/></div>
              <div className="form-group"><label>仕入金額</label><input type="number" value={editForm.purchase} onChange={e=>setEditForm({...editForm,purchase:e.target.value})}/></div>
              <div className="form-group profit-display"><label>利益（自動）</label><input readOnly value={calcProfit(editForm.sales,editForm.purchase).toLocaleString("ja-JP")}/></div>
              <div className="form-group rate-display"><label>利益率（自動）</label><input readOnly value={fmtPct(calcRate(editForm.sales,editForm.purchase))}/></div>
              <div className="form-group">
                <label>担当者</label>
                <StaffToggle value={editForm.staff||"福田"} onChange={s=>setEditForm({...editForm,staff:s})} options={STAFF_OPTIONS} />
              </div>
              <div className="form-group"><label>受注ランク</label><select value={editForm.rank} onChange={e=>setEditForm({...editForm,rank:e.target.value})}>{RANK_OPTIONS.map(r=><option key={r}>{r}</option>)}</select></div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:24,alignItems:"flex-start"}}>
              <button className="btn btn-danger" onClick={()=>setDeleteTarget(editForm)}>🗑 削除</button>
              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-secondary" onClick={()=>{setEditId(null);setDeleteTarget(null);}}>キャンセル</button>
                <button className="btn btn-primary" onClick={handleEditSave}>保存</button>
              </div>
            </div>
            {deleteTarget && (
              <div className="delete-confirm">
                <p>⚠️ 削除すると売上見込みから除外されます。<br/>本当に削除する場合は下に <strong>「削除確認」</strong> と入力してください。</p>
                <input type="text" placeholder="削除確認" value={deleteInput} onChange={e=>setDeleteInput(e.target.value)}/>
                <div style={{display:"flex",gap:10}}>
                  <button className="btn btn-secondary" onClick={()=>{setDeleteTarget(null);setDeleteInput("");}}>やめる</button>
                  <button className="btn btn-danger" onClick={handleDelete}>完全に削除する</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ガス削除確認モーダル */}
      {gasDeleteTarget && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget){setGasDeleteTarget(null);setGasDeleteInput("");}}}>
          <div className="modal" style={{maxWidth:480}}>
            <div className="modal-title">🗑 ガス売上を削除</div>
            <div style={{fontSize:13,color:"var(--text2)",marginBottom:16,lineHeight:1.7}}>
              <strong>{FISCAL_MONTHS.find(m=>monthKey(m.year,m.month)===gasDeleteTarget.monthKey)?.label}</strong>・<strong>{gasDeleteTarget.period}</strong>（見込：{fmt(gasDeleteTarget.forecast)}）を削除します。
            </div>
            <div className="delete-confirm">
              <p>⚠️ 削除すると売上見込みから除外されます。<br/>本当に削除する場合は下に <strong>「削除確認」</strong> と入力してください。</p>
              <input type="text" placeholder="削除確認" value={gasDeleteInput} onChange={e=>setGasDeleteInput(e.target.value)}/>
              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-secondary" onClick={()=>{setGasDeleteTarget(null);setGasDeleteInput("");}}>やめる</button>
                <button className="btn btn-danger" onClick={handleGasDelete}>完全に削除する</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// CSS変数をJSから参照するためのヘルパー
const var_gold_bg = "var(--gold-bg)";

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

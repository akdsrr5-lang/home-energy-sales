<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ホームエネルギー部 売上物件管理</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f7fa;
      --bg2: #eef1f6;
      --white: #ffffff;
      --border: #e2e6ed;
      --border2: #d0d5de;
      --text: #1a2033;
      --text2: #4a5568;
      --muted: #8a96aa;
      --accent: #2563eb;
      --accent2: #1d4ed8;
      --accent-bg: #eff6ff;
      --green: #059669;
      --green-bg: #ecfdf5;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --gold: #d97706;
      --gold-bg: #fffbeb;
      --purple: #7c3aed;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
      --shadow-lg: 0 10px 30px rgba(0,0,0,.1), 0 4px 8px rgba(0,0,0,.05);
      --radius: 12px;
      --radius-sm: 8px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; line-height: 1.6; }

    /* ── Header ── */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      height: 64px;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow-sm);
    }
    .header-logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .header-title { font-size: 16px; font-weight: 700; color: var(--text); font-family: 'Sora', sans-serif; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-badge {
      margin-left: auto;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 11px; font-weight: 700;
      padding: 4px 12px; border-radius: 20px;
      border: 1px solid #bfdbfe;
      font-family: 'Sora', sans-serif;
    }
    .save-status { font-size: 11px; color: var(--green); margin-left: 8px; opacity: 0; transition: opacity .3s; display: flex; align-items: center; gap: 4px; }
    .save-status.show { opacity: 1; }

    /* ── Tabs ── */
    .tabs {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      overflow-x: auto;
    }
    .tab {
      padding: 16px 20px;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all .2s;
      border-top: none; border-left: none; border-right: none;
      background: none;
      font-family: inherit;
      white-space: nowrap;
      letter-spacing: .01em;
    }
    .tab:hover { color: var(--text2); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

    /* ── Content ── */
    .content { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    /* ── Section title ── */
    .section-title {
      font-size: 13px; font-weight: 700; color: var(--text2);
      letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Cards ── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }

    /* ── Form ── */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--text2); letter-spacing: .06em;
      margin-bottom: 6px; text-transform: uppercase;
    }
    .form-group input, .form-group select {
      width: 100%; padding: 9px 12px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      border: 1.5px solid var(--border);
      color: var(--text); font-size: 13px; font-family: inherit;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
      background: var(--white);
    }
    .form-group select option { background: var(--white); }
    .form-group.profit-display input { color: var(--green); font-weight: 700; background: var(--green-bg); border-color: #a7f3d0; }
    .form-group.rate-display input { color: var(--gold); font-weight: 700; background: var(--gold-bg); border-color: #fcd34d; }
    .form-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }

    /* ── Buttons ── */
    .btn { padding: 9px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all .15s; letter-spacing: .02em; }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 1px 3px rgba(37,99,235,.3); }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.3); }
    .btn-secondary { background: var(--white); color: var(--text2); border: 1.5px solid var(--border2); }
    .btn-secondary:hover { border-color: var(--text2); color: var(--text); }
    .btn-danger { background: var(--white); color: var(--red); border: 1.5px solid #fca5a5; font-size: 12px; padding: 7px 14px; }
    .btn-danger:hover { background: var(--red-bg); }
    .btn-edit { background: var(--white); color: var(--accent); border: 1.5px solid #bfdbfe; font-size: 12px; padding: 5px 12px; border-radius: 6px; }
    .btn-edit:hover { background: var(--accent-bg); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); background: var(--white); box-shadow: var(--shadow-sm); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: var(--bg); }
    thead th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:hover { background: var(--bg); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 11px 14px; vertical-align: middle; white-space: nowrap; }

    /* ── Badges ── */
    .rank-badge { display: inline-block; width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; font-size: 11px; font-weight: 900; }
    .rank-A { background: #fee2e2; color: var(--red); }
    .rank-B { background: var(--gold-bg); color: var(--gold); }
    .rank-C { background: var(--green-bg); color: var(--green); }
    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .status-見積 { background: var(--bg2); color: var(--text2); }
    .status-受注 { background: var(--gold-bg); color: var(--gold); border: 1px solid #fcd34d; }
    .status-売上 { background: var(--green-bg); color: var(--green); border: 1px solid #6ee7b7; }
    .status-失注 { background: #f5f3ff; color: var(--purple); border: 1px solid #ddd6fe; }

    /* ── Numbers ── */
    .num { font-family: 'DM Mono', monospace; font-size: 12px; text-align: right; }
    .num.profit { color: var(--green); }
    .num.loss { color: var(--red); }
    .num.gold { color: var(--gold); }

    /* ── Budget table ── */
    .budget-table th.sub { color: var(--muted); font-size: 10px; }
    .diff-pos { color: var(--green); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; }
    .diff-neg { color: var(--red); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; }
    .diff-zero { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }
    .budget-input {
      width: 130px; padding: 6px 10px; border-radius: 6px;
      text-align: right; background: var(--bg);
      border: 1.5px solid var(--border); color: var(--text);
      font-size: 12px; font-family: 'DM Mono', monospace; outline: none;
    }
    .budget-input:focus { border-color: var(--accent); background: var(--white); box-shadow: 0 0 0 3px rgba(37,99,235,.08); }
    .annual-highlight { background: linear-gradient(90deg, #f0fdf4, #eff6ff) !important; border-top: 2px solid var(--green) !important; }
    .annual-highlight td { padding: 16px 14px !important; font-weight: 800 !important; }

    /* ── Stats bar ── */
    .stats-bar { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px;
      min-width: 140px; flex: 1;
      box-shadow: var(--shadow-sm);
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-card.blue::before { background: linear-gradient(90deg, var(--accent), #7c3aed); }
    .stat-card.green::before { background: linear-gradient(90deg, var(--green), #10b981); }
    .stat-card.gold::before { background: linear-gradient(90deg, var(--gold), #f59e0b); }
    .stat-card.red::before { background: linear-gradient(90deg, var(--red), #ef4444); }
    .stat-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
    .stat-value { font-size: 20px; font-weight: 800; color: var(--text); margin-top: 6px; font-family: 'Sora', sans-serif; }
    .stat-value.blue { color: var(--accent); }
    .stat-value.green { color: var(--green); }
    .stat-value.gold { color: var(--gold); }
    .stat-value.red { color: var(--red); }

    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border);
      background: var(--white); color: var(--text2); font-family: inherit;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.4);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px;
      width: 90%; max-width: 640px; max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 24px; font-family: 'Sora', sans-serif; }
    .delete-confirm {
      background: var(--red-bg); border: 1px solid #fca5a5;
      border-radius: 10px; padding: 16px; margin-top: 16px;
    }
    .delete-confirm p { color: var(--red); margin-bottom: 12px; line-height: 1.6; font-size: 13px; }
    .delete-confirm input {
      width: 100%; padding: 8px 12px; border-radius: 6px;
      background: var(--white); border: 1.5px solid #fca5a5;
      color: var(--red); font-size: 13px; font-family: 'DM Mono', monospace;
      outline: none; margin-bottom: 10px;
    }

    /* ── Gas tab ── */
    .gas-actual-input {
      width: 130px; padding: 6px 10px; border-radius: 6px;
      text-align: right; background: var(--bg);
      border: 1.5px solid var(--border); color: var(--text);
      font-size: 12px; font-family: 'DM Mono', monospace; outline: none;
    }
    .gas-actual-input:focus { border-color: var(--green); background: var(--white); }

    @media(max-width:640px){
      .content { padding: 16px; }
      .header { padding: 0 16px; }
      .header-title { font-size: 14px; }
      .tabs { padding: 0 8px; }
      .tab { padding: 12px 14px; font-size: 12px; }
      .stats-bar { gap: 10px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const FISCAL_MONTHS = [
  { label:"2026年6月",  year:2026, month:6  },
  { label:"2026年7月",  year:2026, month:7  },
  { label:"2026年8月",  year:2026, month:8  },
  { label:"2026年9月",  year:2026, month:9  },
  { label:"2026年10月", year:2026, month:10 },
  { label:"2026年11月", year:2026, month:11 },
  { label:"2026年12月", year:2026, month:12 },
  { label:"2027年1月",  year:2027, month:1  },
  { label:"2027年2月",  year:2027, month:2  },
  { label:"2027年3月",  year:2027, month:3  },
  { label:"2027年4月",  year:2027, month:4  },
  { label:"2027年5月",  year:2027, month:5  },
];
const STATUS_OPTIONS = ["見積","受注","売上","失注"];
const RANK_OPTIONS   = ["A","B","C"];
const STAFF_OPTIONS  = ["福田","原田"];
const EMPTY_FORM     = { date:"", status:"見積", name:"", sales:"", purchase:"", rank:"A", staff:"福田" };
const EMPTY_GAS_FORM = { monthKey:"2026-06", period:"前期", forecast:"" };

const fmt    = n => n == null || n === "" ? "—" : Number(n).toLocaleString("ja-JP") + "円";
const fmtK   = n => n == null || n === 0  ? "—" : (Math.round(Number(n)/1000)).toLocaleString("ja-JP") + "千円";
const fmtPct = n => n == null || isNaN(n) ? "—" : Number(n).toFixed(1) + "%";
const calcProfit = (s,p) => (parseFloat(s)||0) - (parseFloat(p)||0);
const calcRate   = (s,p) => { const sv=parseFloat(s)||0; return sv===0?0:((sv-(parseFloat(p)||0))/sv)*100; };
const monthKey   = (y,m) => `${y}-${String(m).padStart(2,"0")}`;
const dateToMK   = d => { if(!d) return null; const dt=new Date(d); return monthKey(dt.getFullYear(),dt.getMonth()+1); };

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzpEaLlJwAvhJmyBKYo0AfqY1o9kh7f9TMSt7zYVyLFRMYIy1BMTIqtj5wU7FSerd8LDA/exec';

// ローカルキャッシュ（オフライン対応）
const lsGet = key => { try { const v=localStorage.getItem(key); return v?JSON.parse(v):null; } catch { return null; } };
const lsSet = (key,val) => { try { localStorage.setItem(key,JSON.stringify(val)); } catch {} };

// スプレッドシートからロード（リダイレクト対応）
function gasLoad() {
  return fetch(GAS_URL + '?action=load', { redirect: 'follow' })
    .then(r => r.text())
    .then(text => {
      // レスポンスからJSONを抽出（リダイレクト後のHTMLが混入する場合対策）
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('no JSON in response');
      return JSON.parse(match[0]);
    });
}
// GETフェッチで保存（リトライ付き）
function saveKey(key, val) {
  const url = GAS_URL + '?action=save_each&key=' + encodeURIComponent(key) + '&val=' + encodeURIComponent(JSON.stringify(val));
  const attempt = (n) => fetch(url)
    .then(() => ({ ok: true }))
    .catch(e => {
      if (n > 0) return new Promise(r => setTimeout(r, 800)).then(() => attempt(n - 1));
      console.error('saveKey failed:', key, e);
    });
  return attempt(2); // 最大3回試行
}
// 保存後にloadで確認し、件数が合わなければ再保存
function saveKeyWithVerify(key, val) {
  return saveKey(key, val).then(() => {
    setTimeout(() => {
      gasLoad().then(data => {
        const saved = data[key];
        const ok = Array.isArray(val)
          ? (Array.isArray(saved) && saved.length === val.length)
          : (saved && JSON.stringify(saved) === JSON.stringify(val));
        if (!ok) { console.warn('verify failed, retry:', key); saveKey(key, val); }
      }).catch(() => {});
    }, 2000);
  });
}
// スプレッドシートへ保存（propertiesは検証付き）
function gasSave(properties, budgets, gas) {
  return saveKeyWithVerify('properties', properties)
    .then(() => saveKey('budgets', budgets))
    .then(() => saveKey('gas', gas));
}
// ロックだけ保存
function saveLocks(locks) {
  return saveKey('locks', locks);
}

function StaffToggle({ value, onChange, options }) {
  return (
    <div style={{display:"flex",gap:8,marginTop:2}}>
      {options.map(s=>(
        <button key={s} type="button" onClick={()=>onChange(s)}
          style={{flex:1,padding:"8px 0",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all .15s",
            background:value===s?"var(--accent)":"var(--bg)",
            color:value===s?"#fff":"var(--text2)",
            border:value===s?"1.5px solid var(--accent)":"1.5px solid var(--border)"}}>
          {s}
        </button>
      ))}
    </div>
  );
}

// 折りたたみセクションコンポーネント
function CollapsibleSection({ title, defaultOpen, children }) {
  const [open, setOpen] = useState(defaultOpen !== false);
  return (
    <div style={{marginBottom:20}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",
          background:"var(--white)",border:"1px solid var(--border)",borderRadius:open?"10px 10px 0 0":"10px",
          cursor:"pointer",fontFamily:"inherit",transition:"all .15s",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
        <span style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>{title}</span>
        <span style={{fontSize:18,color:"var(--muted)",transition:"transform .2s",display:"inline-block",transform:open?"rotate(180deg)":"rotate(0deg)"}}>▾</span>
      </button>
      {open && (
        <div style={{border:"1px solid var(--border)",borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden",background:"var(--white)",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
          <div style={{padding:"16px"}}>
            {children}
          </div>
        </div>
      )}
    </div>
  );
}

// ガス使用量入力コンポーネント（他端末同期対応）
function GasUsageInput({ monthKey, field, value, onSave, unit }) {
  const [local, setLocal] = useState(value === 0 ? "" : String(value));
  useEffect(() => { setLocal(value === 0 ? "" : String(value)); }, [monthKey, field, value]);
  return (
    <input
      type="number"
      placeholder="0"
      value={local}
      onChange={e => setLocal(e.target.value)}
      onBlur={e => onSave(monthKey, field, e.target.value)}
      style={{width:"110px",padding:"6px 10px",borderRadius:6,border:"1.5px solid var(--border)",textAlign:"right",fontSize:13,fontFamily:"'DM Mono',monospace",outline:"none",background:"var(--bg)",color:"var(--text)"}}
    />
  );
}
function RemarkCell({ monthKey, value, onSave, allRemarks }) {
  const [editing, setEditing] = useState(false);
  const [local, setLocal]     = useState(value);
  const [saving, setSaving]   = useState(false);
  const [saved,  setSaved]    = useState(false);
  useEffect(() => { setLocal(value); }, [value]);

  const handleConfirm = () => {
    setSaving(true);
    const next = {...allRemarks, [monthKey]: local};
    onSave(next);
    setEditing(false);
    setTimeout(() => { setSaving(false); setSaved(true); setTimeout(()=>setSaved(false),2000); }, 400);
  };
  const handleCancel = () => { setLocal(value); setEditing(false); };

  return (
    <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
      <div style={{fontSize:11,fontWeight:700,color:"#92400e",flexShrink:0,paddingTop:2,letterSpacing:".04em"}}>
        📝 乖離理由
      </div>
      <div style={{flex:1}}>
        {editing ? (
          <>
            <textarea
              autoFocus
              value={local}
              onChange={e=>setLocal(e.target.value)}
              rows={2}
              style={{width:"100%",padding:"6px 10px",borderRadius:6,border:"1.5px solid var(--accent)",fontSize:12,fontFamily:"inherit",outline:"none",resize:"vertical",color:"var(--text)",background:"var(--white)",lineHeight:1.6}}
            />
            <div style={{display:"flex",gap:8,marginTop:6,justifyContent:"flex-end"}}>
              <button onClick={handleCancel}
                style={{padding:"4px 12px",fontSize:11,fontWeight:600,borderRadius:6,cursor:"pointer",border:"1px solid var(--border)",background:"var(--white)",color:"var(--text2)"}}>
                キャンセル
              </button>
              <button onClick={handleConfirm}
                style={{padding:"4px 14px",fontSize:11,fontWeight:700,borderRadius:6,cursor:"pointer",border:"none",background:"var(--accent)",color:"#fff"}}>
                確定
              </button>
            </div>
          </>
        ) : (
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:12,color:local?"var(--text)":"var(--muted)",fontStyle:local?"normal":"italic",lineHeight:1.6,flex:1}}>
              {local || "未記入"}
            </span>
            <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
              {saving && <span style={{fontSize:10,color:"var(--muted)"}}>保存中…</span>}
              {saved  && <span style={{fontSize:10,color:"var(--green)"}}>✓ 保存済み</span>}
              <button onClick={()=>setEditing(true)}
                style={{padding:"3px 10px",fontSize:11,fontWeight:600,borderRadius:6,cursor:"pointer",border:"1px solid var(--border)",background:"var(--white)",color:"var(--text2)"}}>
                ✏️ 編集
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function BudgetInput({ bkey, locked, value, onSave, onRequestUnlock }) {
  const [local, setLocal] = useState(value === 0 ? "" : String(value));
  useEffect(() => { setLocal(value === 0 ? "" : String(value)); }, [bkey]);
  return (
    <div style={{display:"flex",alignItems:"center",gap:4}}>
      <input
        className="budget-input"
        type={locked ? "text" : "number"}
        value={local}
        placeholder="千円入力"
        readOnly={locked}
        onClick={()=>{ if(locked) onRequestUnlock(bkey); }}
        onChange={e => { if(!locked) setLocal(e.target.value); }}
        onBlur={e => { if(!locked) onSave(bkey, e.target.value); }}
        style={{
          opacity: 1,
          cursor: locked ? "pointer" : "text",
          width: 110,
          background: locked ? "#f1f5f9" : "var(--bg)",
          color: locked ? "var(--muted)" : "var(--text)",
          userSelect: locked ? "none" : "auto",
        }}
        title={locked ? "🔒 クリックして解除（暗証番号が必要）" : ""}
      />
      {locked && (
        <span onClick={()=>onRequestUnlock(bkey)}
          style={{fontSize:13,cursor:"pointer",userSelect:"none"}} title="クリックして解除">🔒</span>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab]           = useState("input");
  const [properties, setProperties] = useState([]);
  const [budgets, setBudgets]   = useState({});
  const [gasEntries, setGasEntries] = useState([]);

  const [saveErr, setSaveErr]   = useState(false);
  const [gasUsage, setGasUsage] = useState({}); // {monthKey: {inspection_m3, kilo_sell, inspection_count}}
  const [budgetLocks, setBudgetLocks] = useState({});

  const [closePin, setClosePin]   = useState({modal:null, input:"", error:false, mode:"close"}); // mode: close|unlock
  const [pinModal, setPinModal]       = useState(null); // 解除対象のbkey
  const [pinInput, setPinInput]       = useState("");
  const [pinError, setPinError]       = useState(false);
  const BUDGET_PIN = "5570";

  const requestUnlock = (bkey) => { setPinModal(bkey); setPinInput(""); setPinError(false); };
  const confirmPin = () => {
    if(pinInput === BUDGET_PIN) {
      const next = {...budgetLocks, [pinModal]: false};
      setBudgetLocks(next);
      lsSet("he_budgetlocks", next);
      saveLocks(next); // スプレッドシートにも保存
      setPinModal(null); setPinInput(""); setPinError(false);
    } else {
      setPinError(true); setPinInput("");
    }
  };
  const lockBudget = (bkey) => {
    const next = {...budgetLocks, [bkey]: true};
    setBudgetLocks(next);
    lsSet("he_budgetlocks", next);
    saveLocks(next); // スプレッドシートにも保存
  };
  const [loading, setLoading]   = useState(true);
  const [syncing, setSyncing]   = useState(false);

  useEffect(() => {
    // まずlocalStorageで即表示（空白画面を防ぐ）
    const p = lsGet("he_properties"); if(p) setProperties(p);
    const b = lsGet("he_budgets");    if(b) setBudgets(b);
    const g = lsGet("he_gas");        if(g) setGasEntries(g);
    const l = lsGet("he_budgetlocks");   if(l) setBudgetLocks(l);
    const cm = lsGet("he_closedmonths"); if(cm) setClosedMonths(cm);
    const cr = lsGet("he_closeremarks"); if(cr) setCloseRemarks(cr);
    const gu = lsGet("he_gasusage");     if(gu) setGasUsage(gu);
    // スプレッドシートから最新を取得して必ず上書き
    gasLoad().then(data => {
      if(data.properties) { setProperties(data.properties); lsSet("he_properties", data.properties); }
      if(data.budgets)      { setBudgets(data.budgets);           lsSet("he_budgets",       data.budgets); }
      if(data.gas)          {
        const fixedGas = data.gas.map(g => g.actual!=null && g.actual>0 && !g.isActual ? {...g, isActual:true} : g);
        setGasEntries(fixedGas); lsSet("he_gas", fixedGas);
        if(fixedGas.some((g,i)=>g.isActual !== data.gas[i].isActual)) saveKey('gas', fixedGas);
      }
      if(data.locks)        { setBudgetLocks(data.locks);         lsSet("he_budgetlocks",   data.locks); }
      if(data.closedMonths) { setClosedMonths(data.closedMonths); lsSet("he_closedmonths",  data.closedMonths); }
      if(data.closeRemarks) { setCloseRemarks(data.closeRemarks); lsSet("he_closeremarks",  data.closeRemarks); }
      if(data.gasUsage)     { setGasUsage(data.gasUsage);         lsSet("he_gasusage",      data.gasUsage); }
    }).catch((e)=>{ 
      console.error('gasLoad failed:', e);
      // フォールバック：localStorageから読み込む
      const p = lsGet("he_properties"); if(p) setProperties(p);
    }).finally(()=>setLoading(false));
  }, []);

  const flash = () => { setSaveMsg(true); setTimeout(()=>setSaveMsg(false),2500); };

  // 保存後に読み込み確認して整合性チェック
  const verifySave = (props) => {
    setTimeout(() => {
      gasLoad().then(data => {
        if (data.properties && data.properties.length !== props.length) {
          // 件数が合わない場合は再保存
          saveKey('properties', props);
        }
      }).catch(()=>{});
    }, 3000);
  };

  const saveAll = (props, bdgs, gas) => {
    lsSet("he_properties", props); lsSet("he_budgets", bdgs); lsSet("he_gas", gas);
    flash();
    setSyncing(true);
    gasSave(props, bdgs, gas).then(()=>{
      // 保存成功後にスプレッドシートから再読み込みして画面を最新化
      return gasLoad().then(data => {
        if(data.properties) { setProperties(data.properties); lsSet("he_properties", data.properties); }
      }).catch(()=>{});
    }).finally(()=>{
      setSyncing(false);
    });
  };
  const saveGas = gas => {
    lsSet("he_gas", gas); flash();
    setSyncing(true);
    gasSave(properties, budgets, gas).finally(()=>setSyncing(false));
  };
  const toggleBudgetLock = key => { lockBudget(key); };

  // 〆機能
  const handleGasUsage = (monthKey, field, val) => {
    const next = {...gasUsage, [monthKey]: {...(gasUsage[monthKey]||{}), [field]: parseFloat(val)||0}};
    setGasUsage(next); lsSet("he_gasusage", next);

  const SANKI_RATE = 0.482; // 産気率
  const isMonthClosed = key => !!closedMonths[key];
  const [closeRemarks, setCloseRemarks] = useState({}); // 月ごとの乖離理由
  const saveClosedMonths = next => {
    setClosedMonths(next); lsSet("he_closedmonths", next);
    saveKey('closedMonths', next);
  };
  const saveCloseRemarks = next => {
    setCloseRemarks(next);
    lsSet("he_closeremarks", next);

    saveKey('closeRemarks', next).then(() => {
      setTimeout(() => {
        gasLoad().then(data => {
          if(!data.closeRemarks || JSON.stringify(data.closeRemarks) !== JSON.stringify(next)) {
            saveKey('closeRemarks', next);

      }, 3000);
    }).catch(()=>{
      // 失敗したら1秒後にリトライ

  const openCloseModal  = (key) => setClosePin({modal:key, input:"", error:false, mode:"close", remark:closeRemarks[key]||""});

      const nextRemarks = {...closeRemarks, [closePin.modal]: closePin.remark||""};
      saveClosedMonths(nextClosed);
      saveCloseRemarks(nextRemarks);

      const nextClosed = {...closedMonths, [closePin.modal]: false};
      saveClosedMonths(nextClosed);
    }
    setClosePin({modal:null, input:"", error:false, mode:"close", remark:""});
  };

  const handleAdd = () => {
    if(!form.date||!form.name) return alert("売上予定日と物件名は必須です");
    const next = [...properties, { id:Date.now().toString(), ...form, sales:parseFloat(form.sales)||0, purchase:parseFloat(form.purchase)||0, createdAt:new Date().toISOString() }];
    setProperties(next); saveAll(next,budgets,gasEntries); setForm(EMPTY_FORM);
  };
  const handleEditSave = () => {

    setProperties(updated); saveAll(updated,budgets,gasEntries); setEditId(null);
  };
  const handleDelete = () => {

  // 予算は千円単位入力 → 円換算
  const budgetYen = key => (budgets[key]||0) * 1000;

  const handleGasAdd = () => {

  const handleGasDelete = () => {

  const gasMonthly = FISCAL_MONTHS.reduce((acc,{year,month})=>{

      hasActual: ents.some(g=>g.isActual&&g.actual!=null)
    };
    return acc;

  const gasTotalForecast = Object.values(gasMonthly).reduce((s,v)=>s+v.forecast,0);

  const totalBudget   = FISCAL_MONTHS.reduce((s,{year,month})=>s+(budgets[monthKey(year,month)]||0),0);

                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </>
              )}
            </>
          )}

          {tab==="list" && (
            <>

                            )}
                          </td>
                          <td style={{background:"#f8fafc"}}><div style={{display:"flex",alignItems:"center",gap:3}}><BudgetInput bkey={key+"_gas"} locked={lockedGas||closed} value={budgets[key+"_gas"]||0} onSave={handleBudget} onRequestUnlock={closed?()=>openUnlockModal(key):requestUnlock}/>{!lockedGas&&!closed&&<button tabIndex={-1} onClick={()=>lockBudget(key+"_gas")} style={{padding:"2px 4px",fontSize:10,cursor:"pointer",border:"1px solid var(--border)",borderRadius:4,background:"transparent",color:"var(--muted)"}}>🔒</button>}</div></td>
                          <td style={{background:"#f8fafc"}}><div style={{display:"flex",alignItems:"center",gap:3}}><BudgetInput bkey={key+"_kougu"} locked={lockedKougu||closed} value={budgets[key+"_kougu"]||0} onSave={handleBudget} onRequestUnlock={closed?()=>openUnlockModal(key):requestUnlock}/>{!lockedKougu&&!closed&&<button tabIndex={-1} onClick={()=>lockBudget(key+"_kougu")} style={{padding:"2px 4px",fontSize:10,cursor:"pointer",border:"1px solid var(--border)",borderRadius:4,background:"transparent",color:"var(--muted)"}}>🔒</button>}</div></td>
                          <td className="num" style={{fontWeight:700,borderRight:"2px solid var(--border)",background:"#f8fafc",color:bTotal>0?"var(--text2)":"var(--border2)"}}>{fmtK(bTotal)}</td>
                          <td>{ACell(aGas,bGas)}</td>
                          <td>{ACell(aKougu,bKougu)}</td>
                          <td className="num" style={{fontWeight:700,color:aTotal>0?"var(--green)":"var(--border2)"}}>{fmtK(aTotal)}</td>
                          <td style={{borderRight:"2px solid var(--border)"}}>{R(rATotal)}</td>
                          <td>{FCell2(fGas,bGas,aGas)}</td>
                          <td>{FCell2(fKougu,bKougu,aKougu)}</td>
                          <td className="num" style={{fontWeight:700,color:fTotal>0?"var(--gold)":"var(--border2)"}}>{fmtK(fTotal)}</td>
                          <td>{R(rFTotal)}</td>
                        </tr>
                        {/* 乖離理由行 - 確定済み月のみ表示 */}
                        {closed && (
                          <tr style={{background:"#fffdf0",borderBottom:"2px solid #fde68a"}}>
                            <td colSpan={13} style={{padding:"8px 16px"}}>
                              <RemarkCell monthKey={key} value={closeRemarks[key]||""} onSave={saveCloseRemarks} allRemarks={closeRemarks}/>
                            </td>
                          </tr>
                        )}
                        {/* 未確定月でも理由があれば表示（解除前に入力済みの場合） */}
                        </>);
                      };
                      const SummaryRow=({label,g,bg,borderTop,isTotal})=>(<tr style={{background:bg,borderTop:borderTop||"none"}}>
                        <td style={{fontWeight:isTotal?900:700,fontSize:isTotal?13:12,color:isTotal?"var(--green)":label.includes("下期")?"#0369a1":"#059669",whiteSpace:"nowrap"}}>{label}</td>
                        <td></td>
                        <td style={{background:isTotal?"#dcfce7":"#f1f5f9"}} colSpan={2}><span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:11,color:"var(--text2)"}}>G:{fmtK(g.bGas)} 工:{fmtK(g.bKougu)}</span></td>
                        <td style={{borderRight:"2px solid var(--border)",background:isTotal?"#dcfce7":"#f1f5f9"}}><span style={{fontFamily:"'DM Mono',monospace",fontWeight:900,fontSize:isTotal?13:11,color:isTotal?"var(--green)":"var(--text2)"}}>{fmtK(g.bTotal)}</span></td>
                        <td><div style={{textAlign:"right"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--green)",fontWeight:700}}>{fmtK(g.aGas)}</div>{g.rGas!==null&&<div style={{fontSize:9,color:g.rGas>=100?"var(--green)":g.rGas>=80?"var(--gold)":"var(--red)"}}>{Math.round(g.rGas)}%</div>}</div></td>
                        <td><div style={{textAlign:"right"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--green)",fontWeight:700}}>{fmtK(g.aKougu)}</div>{g.rKougu!==null&&<div style={{fontSize:9,color:g.rKougu>=100?"var(--green)":g.rKougu>=80?"var(--gold)":"var(--red)"}}>{Math.round(g.rKougu)}%</div>}</div></td>
                        <td><span style={{fontFamily:"'DM Mono',monospace",fontWeight:900,fontSize:isTotal?14:12,color:"var(--green)"}}>{fmtK(g.aTotal)}</span></td>
                        <td style={{borderRight:"2px solid var(--border)"}}>{R(g.rATotal,isTotal?14:12)}</td>
                        <td><div style={{textAlign:"right"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--gold)",fontWeight:700}}>{fmtK(g.fGas)}</div>{g.rFTotal!==null&&<div style={{fontSize:9,color:"var(--muted)"}}>残:{fmtK(Math.max(g.fGas-g.aGas,0))}</div>}</div></td>
                        <td><div style={{textAlign:"right"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--gold)",fontWeight:700}}>{fmtK(g.fKougu)}</div>{g.rFTotal!==null&&<div style={{fontSize:9,color:"var(--muted)"}}>残:{fmtK(Math.max(g.fKougu-g.aKougu,0))}</div>}</div></td>
                        <td><span style={{fontFamily:"'DM Mono',monospace",fontWeight:900,fontSize:isTotal?14:12,color:"var(--gold)"}}>{fmtK(g.fTotal)}</span></td>
                        <td>{R(g.rFTotal,isTotal?14:12)}</td>
                      </tr>);
                      return(<>
                        {KAMI.map(m=><MonthRow key={monthKey(m.year,m.month)} {...m}/>)}
                        <SummaryRow label="📗 上期合計（6〜11月）" g={kami} bg="#f0fdf4" borderTop="2px solid #6ee7b7"/>
                        {SHIMO.map(m=><MonthRow key={monthKey(m.year,m.month)} {...m}/>)}
                        <SummaryRow label="📘 下期合計（12〜5月）" g={shimo} bg="#eff6ff" borderTop="2px solid #bfdbfe"/>
                        <SummaryRow label="🏆 通期合計（6〜5月）" g={total} bg="#f0fdf4" borderTop="3px solid var(--green)" isTotal/>
                      </>);
                    })()}
                  </tbody>
                </table>
              </div>
            </>
          )}
        </div>
      </div>

      {/* 編集モーダル */}
      {editId && editForm && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget){setEditId(null);setDeleteTarget(null);}}}>
          <div className="modal">
            <div className="modal-title">✏️ 物件情報を編集</div>
            <div className="form-grid">
              <div className="form-group"><label>売上予定日</label><input type="date" value={editForm.date} onChange={e=>setEditForm({...editForm,date:e.target.value})}/></div>
              <div className="form-group"><label>ステータス</label><select value={editForm.status} onChange={e=>setEditForm({...editForm,status:e.target.value})}>{STATUS_OPTIONS.map(s=><option key={s}>{s}</option>)}</select></div>
              <div className="form-group" style={{gridColumn:"span 2"}}><label>物件名</label><input type="text" value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})}/></div>
              <div className="form-group"><label>売上金額</label><input type="number" value={editForm.sales} onChange={e=>setEditForm({...editForm,sales:e.target.value})}/></div>
              <div className="form-group"><label>仕入金額</label><input type="number" value={editForm.purchase} onChange={e=>setEditForm({...editForm,purchase:e.target.value})}/></div>
              <div className="form-group profit-display"><label>利益（自動）</label><input readOnly value={calcProfit(editForm.sales,editForm.purchase).toLocaleString("ja-JP")}/></div>
              <div className="form-group rate-display"><label>利益率（自動）</label><input readOnly value={fmtPct(calcRate(editForm.sales,editForm.purchase))}/></div>
              <div className="form-group">
                <label>担当者</label>
                <StaffToggle value={editForm.staff||"福田"} onChange={s=>setEditForm({...editForm,staff:s})} options={STAFF_OPTIONS} />
              </div>
              <div className="form-group"><label>受注ランク</label><select value={editForm.rank} onChange={e=>setEditForm({...editForm,rank:e.target.value})}>{RANK_OPTIONS.map(r=><option key={r}>{r}</option>)}</select></div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:24,alignItems:"flex-start"}}>
              <button className="btn btn-danger" onClick={()=>setDeleteTarget(editForm)}>🗑 削除</button>
              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-secondary" onClick={()=>{setEditId(null);setDeleteTarget(null);}}>キャンセル</button>
                <button className="btn btn-primary" onClick={handleEditSave}>保存</button>
              </div>
            </div>
            {deleteTarget && (
              <div className="delete-confirm">
                <p>⚠️ 削除すると売上見込みから除外されます。<br/>本当に削除する場合は下に <strong>「削除確認」</strong> と入力してください。</p>
                <input type="text" placeholder="削除確認" value={deleteInput} onChange={e=>setDeleteInput(e.target.value)}/>
                <div style={{display:"flex",gap:10}}>
                  <button className="btn btn-secondary" onClick={()=>{setDeleteTarget(null);setDeleteInput("");}}>やめる</button>
                  <button className="btn btn-danger" onClick={handleDelete}>完全に削除する</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* 売上確認モーダル */}
      {salesConfirmTarget && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget) setSalesConfirmTarget(null);}}>
          <div className="modal" style={{maxWidth:480}}>
            <div className="modal-title">💰 売上確定</div>
            <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.8,marginBottom:20}}>
              以下の物件を <strong style={{color:"var(--green)"}}>「売上」</strong> に変更します。<br/>
              売上管理表の実績に反映されます。
            </div>
            <div style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,padding:"16px 18px",marginBottom:20}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>{salesConfirmTarget.name}</div>
              <div style={{display:"flex",gap:20,fontSize:12,color:"var(--text2)"}}>
                <span>📅 {salesConfirmTarget.date}</span>
                <span>👤 {salesConfirmTarget.staff||"—"}</span>
                <span>💴 {fmt(salesConfirmTarget.sales)}</span>
              </div>
              <div style={{marginTop:8,fontSize:12}}>
                <span className={`status-badge status-${salesConfirmTarget.status}`}>{salesConfirmTarget.status}</span>
                <span style={{margin:"0 8px",color:"var(--muted)"}}>→</span>
                <span className="status-badge status-売上">売上</span>
              </div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button className="btn btn-secondary" onClick={()=>setSalesConfirmTarget(null)}>キャンセル</button>
              <button className="btn" onClick={handleSalesConfirm}
                style={{background:"var(--green)",color:"#fff",padding:"9px 24px",fontSize:13,fontWeight:700,borderRadius:8}}>
                ✓ 売上確定する
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 暗証番号モーダル */}
      {pinModal && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget){setPinModal(null);setPinInput("");setPinError(false);}}}>
          <div className="modal" style={{maxWidth:360}}>
            <div className="modal-title">🔒 予算ロック解除</div>
            <div style={{fontSize:13,color:"var(--text2)",marginBottom:16}}>暗証番号を入力してください。</div>
            <input
              type="password"
              value={pinInput}
              onChange={e=>{setPinInput(e.target.value);setPinError(false);}}
              onKeyDown={e=>e.key==="Enter"&&confirmPin()}
              placeholder="暗証番号"
              autoFocus
              style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`1.5px solid ${pinError?"var(--red)":"var(--border)"}`,fontSize:18,textAlign:"center",letterSpacing:8,outline:"none",fontFamily:"'DM Mono',monospace",marginBottom:8}}
            />
            {pinError && <div style={{color:"var(--red)",fontSize:12,marginBottom:8,textAlign:"center"}}>暗証番号が違います</div>}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
              <button className="btn btn-secondary" onClick={()=>{setPinModal(null);setPinInput("");setPinError(false);}}>キャンセル</button>
              <button className="btn btn-primary" onClick={confirmPin}>解除</button>
            </div>
          </div>
        </div>
      )}

      {/* 月次月次確定・解除モーダル */}
      {closePin.modal && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget) setClosePin(p=>({...p,modal:null}));}}>
          <div className="modal" style={{maxWidth:400}}>
            <div className="modal-title">
              {closePin.mode==="close"?"🔐 月次確定":"🔓 確定解除"}
            </div>
            {closePin.mode==="close" ? (
              <div style={{fontSize:13,color:"var(--text2)",marginBottom:12,lineHeight:1.7}}>
                <strong style={{color:"var(--red)"}}>{FISCAL_MONTHS.find(m=>monthKey(m.year,m.month)===closePin.modal)?.label}</strong> を確定します。<br/>
                確定後はすべての数字が変更できなくなります。
              </div>
            ) : (
              <div style={{fontSize:13,color:"var(--text2)",marginBottom:12,lineHeight:1.7}}>
                <strong style={{color:"var(--red)"}}>{FISCAL_MONTHS.find(m=>monthKey(m.year,m.month)===closePin.modal)?.label}</strong> の確定を解除します。<br/>
                暗証番号を入力してください。
              </div>
            )}
            {closePin.mode==="close" && (
              <div style={{marginBottom:14}}>
                <label style={{fontSize:11,fontWeight:700,color:"var(--text2)",letterSpacing:".06em",textTransform:"uppercase",display:"block",marginBottom:6}}>予算乖離理由（任意）</label>
                <textarea
                  value={closePin.remark||""}
                  onChange={e=>setClosePin(p=>({...p,remark:e.target.value}))}
                  placeholder="例）大型案件の受注遅延により未達。来月繰越予定。"
                  rows={3}
                  style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid var(--border)",fontSize:13,fontFamily:"inherit",outline:"none",resize:"vertical",color:"var(--text)",background:"var(--bg)"}}
                />
              </div>
            )}
            <input
              type="password"
              value={closePin.input}
              onChange={e=>setClosePin(p=>({...p,input:e.target.value,error:false}))}
              onKeyDown={e=>e.key==="Enter"&&confirmClosePin()}
              placeholder="暗証番号"
              autoFocus
              style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`1.5px solid ${closePin.error?"var(--red)":"var(--border)"}`,fontSize:18,textAlign:"center",letterSpacing:8,outline:"none",fontFamily:"'DM Mono',monospace",marginBottom:8}}
            />
            {closePin.error && <div style={{color:"var(--red)",fontSize:12,marginBottom:8,textAlign:"center"}}>暗証番号が違います</div>}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
              <button className="btn btn-secondary" onClick={()=>setClosePin(p=>({...p,modal:null}))}>キャンセル</button>
              <button className="btn" onClick={confirmClosePin}
                style={{background:closePin.mode==="close"?"var(--red)":"var(--green)",color:"#fff",padding:"9px 24px",fontSize:13,fontWeight:700,borderRadius:8}}>
                {closePin.mode==="close"?"当月確定":"解除する"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ガス削除確認モーダル */}
      {gasDeleteTarget && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget){setGasDeleteTarget(null);setGasDeleteInput("");}}}>
          <div className="modal" style={{maxWidth:480}}>
            <div className="modal-title">🗑 ガス売上を削除</div>
            <div style={{fontSize:13,color:"var(--text2)",marginBottom:16,lineHeight:1.7}}>
              <strong>{FISCAL_MONTHS.find(m=>monthKey(m.year,m.month)===gasDeleteTarget.monthKey)?.label}</strong>・<strong>{gasDeleteTarget.period}</strong>（見込：{fmt(gasDeleteTarget.forecast)}）を削除します。
            </div>
            <div className="delete-confirm">
              <p>⚠️ 削除すると売上見込みから除外されます。<br/>本当に削除する場合は下に <strong>「削除確認」</strong> と入力してください。</p>
              <input type="text" placeholder="削除確認" value={gasDeleteInput} onChange={e=>setGasDeleteInput(e.target.value)}/>
              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-secondary" onClick={()=>{setGasDeleteTarget(null);setGasDeleteInput("");}}>やめる</button>
                <button className="btn btn-danger" onClick={handleGasDelete}>完全に削除する</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
